openapi: "3.0.3"
info:
  title: Rules Resolution Service
  description: |
    Resolves configuration for foreclosure cases by applying specificity-ranked
    override records against a set of defaults.

    ## How Resolution Works

    Every case has a **context** of four dimensions: `state`, `client`, `investor`, `caseType`.
    For each of the 6 workflow steps × 6 configurable traits (36 cells), the service finds
    all matching overrides and selects the **most specific** one (most pinned dimensions wins).

    **Tiebreak order:** specificity DESC → effectiveDate DESC → createdAt DESC

    If two overrides tie on all three, both match the same context with no way to distinguish
    them — that is a **conflict**, flagged in the response and reported by `GET /api/overrides/conflicts`.

    ## Override Lifecycle

    `draft` → `active` → `archived`

    Only `active` overrides participate in resolution. `draft` overrides are stored but ignored
    until explicitly activated.
  version: "1.0.0"
  contact:
    name: Pearson Specter Litt Engineering

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Resolution
    description: Resolve case configuration and explain resolution decisions
  - name: Overrides
    description: Manage override records (CRUD, status, history, conflicts)
  - name: Health
    description: Service health check

paths:

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/resolve:
    post:
      tags: [Resolution]
      summary: Resolve case configuration
      operationId: resolve
      description: |
        Given a case context, resolves the full configuration for all 6 workflow steps.
        Each of the 36 step/trait cells returns the winning value, its source (`default` or
        `override`), and the override ID if applicable.

        Pass `asOfDate` to resolve configuration as it stood on a specific date
        (time-travel resolution). Defaults to today.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveRequest"
            examples:
              fl_chase_fha:
                summary: Florida, Chase, FHA — triggers spec-3 overrides
                value:
                  state: FL
                  client: Chase
                  investor: FHA
                  caseType: FC-Judicial
              fl_chase_fha_asof:
                summary: Same context but as of 2025-07-01 (before spec-3 overrides were effective)
                value:
                  state: FL
                  client: Chase
                  investor: FHA
                  caseType: FC-Judicial
                  asOfDate: "2025-07-01"
              tx_nonjudicial:
                summary: Texas non-judicial — judgment step is skipped (slaHours=0)
                value:
                  state: TX
                  client: Nationstar
                  investor: FannieMae
                  caseType: FC-NonJudicial
      responses:
        "200":
          description: Resolved configuration for all steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/resolve/explain:
    post:
      tags: [Resolution]
      summary: Explain resolution decisions
      operationId: resolveExplain
      description: |
        Same input as `/api/resolve`, but returns a full resolution trace for every
        step/trait cell — every override that was considered, its specificity, and
        whether it was selected or shadowed and why.

        Use this endpoint to answer: *"Why does this case have a 7-day deadline?"*
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveRequest"
            examples:
              fl_chase_fha:
                summary: FL+Chase+FHA — shows 3-deep specificity cascade for file-complaint
                value:
                  state: FL
                  client: Chase
                  investor: FHA
                  caseType: FC-Judicial
      responses:
        "200":
          description: Full resolution trace for all steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplainResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/overrides:
    get:
      tags: [Overrides]
      summary: List overrides
      operationId: listOverrides
      description: List all overrides with optional filtering. Supports any combination of filters.
      parameters:
        - name: stepKey
          in: query
          schema:
            $ref: "#/components/schemas/StepKey"
          example: file-complaint
        - name: traitKey
          in: query
          schema:
            $ref: "#/components/schemas/TraitKey"
          example: slaHours
        - name: state
          in: query
          schema:
            type: string
          example: FL
        - name: client
          in: query
          schema:
            type: string
          example: Chase
        - name: investor
          in: query
          schema:
            type: string
          example: FHA
        - name: caseType
          in: query
          schema:
            $ref: "#/components/schemas/CaseType"
          example: FC-Judicial
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OverrideStatus"
          example: active
      responses:
        "200":
          description: List of matching overrides
          content:
            application/json:
              schema:
                type: object
                properties:
                  overrides:
                    type: array
                    items:
                      $ref: "#/components/schemas/Override"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Overrides]
      summary: Create an override
      operationId: createOverride
      description: |
        Creates a new override. `specificity` is always computed from the selector —
        any caller-supplied value is ignored. Defaults to `draft` status if not specified.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOverrideRequest"
            examples:
              new_override:
                summary: Chase Illinois 8-day filing deadline (draft)
                value:
                  stepKey: file-complaint
                  traitKey: slaHours
                  selector:
                    state: IL
                    client: Chase
                  value: 192
                  effectiveDate: "2026-01-01"
                  status: draft
                  description: Chase Illinois tighter deadline
                  createdBy: admin@pearsonspecter.com
      responses:
        "201":
          description: Created override
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Override"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/overrides/conflicts:
    get:
      tags: [Overrides]
      summary: Detect conflicting overrides
      operationId: getConflicts
      description: |
        Identifies pairs of overrides that conflict with each other.

        Two overrides conflict when **all** of the following are true:
        - Same `stepKey` and `traitKey`
        - Same `specificity`
        - Date ranges overlap
        - Selectors are compatible — no dimension where both pin a **different** value
          (meaning a case exists that would match both, and neither can shadow the other)

        The seed data is conflict-free. This endpoint returns an empty list initially.
      responses:
        "200":
          description: List of conflict pairs (empty if none)
          content:
            application/json:
              schema:
                type: object
                properties:
                  conflicts:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConflictPair"
              examples:
                no_conflicts:
                  summary: Seed data — no conflicts
                  value:
                    conflicts: []
                conflict_found:
                  summary: Two overrides both match FL+FC-Judicial at same specificity
                  value:
                    conflicts:
                      - overrideA: ovr-058
                        overrideB: ovr-059
                        stepKey: file-complaint
                        traitKey: slaHours
                        reason: "Same step/trait (file-complaint/slaHours), same specificity (2), overlapping effective dates, compatible selectors {state: FL, caseType: FC-Judicial} and {state: FL, caseType: FC-Judicial}"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/overrides/{id}:
    get:
      tags: [Overrides]
      summary: Get a single override
      operationId: getOverride
      parameters:
        - $ref: "#/components/parameters/OverrideID"
      responses:
        "200":
          description: The override
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Override"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      tags: [Overrides]
      summary: Update an override
      operationId: updateOverride
      description: |
        Replaces all mutable fields of an override. `specificity` is recomputed
        from the new selector — caller-supplied values are ignored.
      parameters:
        - $ref: "#/components/parameters/OverrideID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOverrideRequest"
      responses:
        "200":
          description: Updated override
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Override"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/overrides/{id}/status:
    patch:
      tags: [Overrides]
      summary: Change override status
      operationId: updateOverrideStatus
      description: |
        Valid transitions:
        - `draft` → `active`
        - `draft` → `archived`
        - `active` → `archived`
        - `archived` → *(terminal — no transitions allowed)*

        Every status change is recorded in the override's audit history.
      parameters:
        - $ref: "#/components/parameters/OverrideID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
            examples:
              activate:
                summary: Activate a draft override
                value:
                  status: active
                  updatedBy: admin@pearsonspecter.com
              archive:
                summary: Archive an active override
                value:
                  status: archived
                  updatedBy: admin@pearsonspecter.com
      responses:
        "204":
          description: Status updated (no body)
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/overrides/{id}/history:
    get:
      tags: [Overrides]
      summary: Get override change history
      operationId: getOverrideHistory
      description: |
        Returns the full audit trail for an override, sorted by most recent first.
        Records every create, update, and status change with before/after snapshots.
      parameters:
        - $ref: "#/components/parameters/OverrideID"
      responses:
        "200":
          description: Change history
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/HistoryEntry"
        "500":
          $ref: "#/components/responses/InternalError"

components:

  parameters:
    OverrideID:
      name: id
      in: path
      required: true
      description: Override ID (e.g. `ovr-034`)
      schema:
        type: string
      example: ovr-034

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: "unknown stepKey: bad-step"
            code: BAD_REQUEST
    NotFound:
      description: Override not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: override not found
            code: NOT_FOUND
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error: internal error
            code: INTERNAL_ERROR

  schemas:

    StepKey:
      type: string
      enum:
        - title-search
        - file-complaint
        - serve-borrower
        - obtain-judgment
        - schedule-sale
        - conduct-sale
      description: Canonical workflow step identifier

    TraitKey:
      type: string
      enum:
        - slaHours
        - requiredDocuments
        - feeAmount
        - feeAuthRequired
        - assignedRole
        - templateId
      description: Configurable trait on a workflow step

    CaseType:
      type: string
      enum:
        - FC-Judicial
        - FC-NonJudicial

    OverrideStatus:
      type: string
      enum:
        - draft
        - active
        - archived
      description: |
        - `draft`: stored but never used in resolution
        - `active`: participates in resolution
        - `archived`: historical record, excluded from resolution and conflict detection

    Selector:
      type: object
      description: |
        Pins zero or more of the four case dimensions. A `null` or omitted dimension
        is a wildcard — it matches any value. Specificity equals the count of non-null fields.
      properties:
        state:
          type: string
          nullable: true
          example: FL
          description: US state abbreviation (FL, NY, TX, IL, OH, …)
        client:
          type: string
          nullable: true
          example: Chase
          description: Loan servicer (Chase, WellsFargo, Nationstar, …)
        investor:
          type: string
          nullable: true
          example: FHA
          description: Loan owner (FHA, VA, FannieMae, FreddieMac, …)
        caseType:
          type: string
          nullable: true
          enum: [FC-Judicial, FC-NonJudicial, null]
          example: FC-Judicial

    ResolveRequest:
      type: object
      required: [state, client, investor, caseType]
      properties:
        state:
          type: string
          example: FL
        client:
          type: string
          example: Chase
        investor:
          type: string
          example: FHA
        caseType:
          $ref: "#/components/schemas/CaseType"
        asOfDate:
          type: string
          format: date
          nullable: true
          description: Resolve as of this date. Defaults to today.
          example: "2025-07-01"

    ResolvedTrait:
      type: object
      required: [value, source]
      properties:
        value:
          description: Resolved value. Type depends on traitKey.
          oneOf:
            - type: integer
              description: slaHours or feeAmount
            - type: boolean
              description: feeAuthRequired
            - type: string
              description: assignedRole or templateId
            - type: array
              items:
                type: string
              description: requiredDocuments
        source:
          type: string
          enum: [default, override]
          description: Whether the value came from the defaults table or an override record
        overrideId:
          type: string
          nullable: true
          description: ID of the winning override (only present when source=override)
          example: ovr-034
        conflict:
          type: boolean
          nullable: true
          description: |
            True when two overrides tied on specificity+effectiveDate.
            The system resolved deterministically (latest createdAt wins) but
            the conflict should be investigated via GET /api/overrides/conflicts.
        conflictsWith:
          type: string
          nullable: true
          description: ID of the other conflicting override (only present when conflict=true)

    ResolvedStep:
      type: object
      description: All 6 resolved traits for one workflow step
      properties:
        slaHours:
          $ref: "#/components/schemas/ResolvedTrait"
        requiredDocuments:
          $ref: "#/components/schemas/ResolvedTrait"
        feeAmount:
          $ref: "#/components/schemas/ResolvedTrait"
        feeAuthRequired:
          $ref: "#/components/schemas/ResolvedTrait"
        assignedRole:
          $ref: "#/components/schemas/ResolvedTrait"
        templateId:
          $ref: "#/components/schemas/ResolvedTrait"

    ResolvedConfig:
      type: object
      required: [context, resolvedAt, steps]
      properties:
        context:
          $ref: "#/components/schemas/ResolveRequest"
        resolvedAt:
          type: string
          format: date-time
          example: "2026-04-05T10:00:00Z"
        steps:
          type: object
          description: Map of stepKey → resolved traits
          properties:
            title-search:
              $ref: "#/components/schemas/ResolvedStep"
            file-complaint:
              $ref: "#/components/schemas/ResolvedStep"
            serve-borrower:
              $ref: "#/components/schemas/ResolvedStep"
            obtain-judgment:
              $ref: "#/components/schemas/ResolvedStep"
            schedule-sale:
              $ref: "#/components/schemas/ResolvedStep"
            conduct-sale:
              $ref: "#/components/schemas/ResolvedStep"
      example:
        context:
          state: FL
          client: Chase
          investor: FHA
          caseType: FC-Judicial
        resolvedAt: "2026-04-05T10:00:00Z"
        steps:
          file-complaint:
            slaHours:
              value: 168
              source: override
              overrideId: ovr-034
            feeAuthRequired:
              value: true
              source: override
              overrideId: ovr-031
            requiredDocuments:
              value: [complaint, summons, lis_pendens, cover_sheet, verification_of_complaint, hud_face_sheet, fha_servicing_history]
              source: override
              overrideId: ovr-036

    TraceCandidate:
      type: object
      properties:
        overrideId:
          type: string
          example: ovr-034
        selector:
          $ref: "#/components/schemas/Selector"
        specificity:
          type: integer
          example: 3
        effectiveDate:
          type: string
          format: date
          example: "2025-09-01"
        value:
          description: The value this override would set
        outcome:
          type: string
          description: Why this candidate was selected or shadowed
          example: "SELECTED — highest specificity"

    TraitTrace:
      type: object
      properties:
        step:
          $ref: "#/components/schemas/StepKey"
        trait:
          $ref: "#/components/schemas/TraitKey"
        resolvedValue:
          description: Final resolved value
        resolvedFrom:
          nullable: true
          description: The winning override (null if resolved from default)
          type: object
          properties:
            overrideId:
              type: string
            selector:
              $ref: "#/components/schemas/Selector"
            specificity:
              type: integer
            effectiveDate:
              type: string
              format: date
        candidates:
          type: array
          description: All overrides that matched the context for this step/trait, in priority order
          items:
            $ref: "#/components/schemas/TraceCandidate"

    ExplainResult:
      type: object
      properties:
        context:
          $ref: "#/components/schemas/ResolveRequest"
        resolvedAt:
          type: string
          format: date-time
        traces:
          type: array
          description: One entry per step/trait cell (36 total)
          items:
            $ref: "#/components/schemas/TraitTrace"
      example:
        context:
          state: FL
          client: Chase
          investor: FHA
          caseType: FC-Judicial
        resolvedAt: "2026-04-05T10:00:00Z"
        traces:
          - step: file-complaint
            trait: slaHours
            resolvedValue: 168
            resolvedFrom:
              overrideId: ovr-034
              selector: { state: FL, client: Chase, investor: FHA }
              specificity: 3
              effectiveDate: "2025-09-01"
            candidates:
              - overrideId: ovr-034
                selector: { state: FL, client: Chase, investor: FHA }
                specificity: 3
                effectiveDate: "2025-09-01"
                value: 168
                outcome: "SELECTED — highest specificity"
              - overrideId: ovr-020
                selector: { state: FL, client: Chase }
                specificity: 2
                effectiveDate: "2025-06-01"
                value: 240
                outcome: "SHADOWED — lower specificity (2 < 3)"
              - overrideId: ovr-001
                selector: { state: FL }
                specificity: 1
                effectiveDate: "2025-01-01"
                value: 360
                outcome: "SHADOWED — lower specificity (1 < 3)"

    Override:
      type: object
      properties:
        id:
          type: string
          example: ovr-034
        stepKey:
          $ref: "#/components/schemas/StepKey"
        traitKey:
          $ref: "#/components/schemas/TraitKey"
        selector:
          $ref: "#/components/schemas/Selector"
        specificity:
          type: integer
          minimum: 0
          maximum: 4
          description: Count of non-null selector dimensions. Always computed — never trusted from caller.
          example: 3
        value:
          description: The override value. Type depends on traitKey.
        effectiveDate:
          type: string
          format: date
          example: "2025-09-01"
        expiresDate:
          type: string
          format: date
          nullable: true
          description: Date after which this override no longer applies. Null = no expiry.
        status:
          $ref: "#/components/schemas/OverrideStatus"
        description:
          type: string
          example: FHA loans via Chase in Florida — 7-day filing deadline
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          example: admin@pearsonspecter.com
        updatedAt:
          type: string
          format: date-time
        updatedBy:
          type: string
          nullable: true

    CreateOverrideRequest:
      type: object
      required: [stepKey, traitKey, selector, value, effectiveDate, createdBy]
      properties:
        id:
          type: string
          description: Optional. Auto-generated if not provided.
        stepKey:
          $ref: "#/components/schemas/StepKey"
        traitKey:
          $ref: "#/components/schemas/TraitKey"
        selector:
          $ref: "#/components/schemas/Selector"
        value:
          description: Value for this trait. Must match the trait type.
        effectiveDate:
          type: string
          format: date
          example: "2026-01-01"
        expiresDate:
          type: string
          format: date
          nullable: true
        status:
          $ref: "#/components/schemas/OverrideStatus"
          description: Defaults to `draft` if omitted.
        description:
          type: string
        createdBy:
          type: string
          example: admin@pearsonspecter.com

    UpdateOverrideRequest:
      type: object
      required: [stepKey, traitKey, selector, value, effectiveDate, updatedBy]
      properties:
        stepKey:
          $ref: "#/components/schemas/StepKey"
        traitKey:
          $ref: "#/components/schemas/TraitKey"
        selector:
          $ref: "#/components/schemas/Selector"
        value:
          description: Replacement value for this trait.
        effectiveDate:
          type: string
          format: date
        expiresDate:
          type: string
          format: date
          nullable: true
        description:
          type: string
        updatedBy:
          type: string
          example: admin@pearsonspecter.com

    UpdateStatusRequest:
      type: object
      required: [status, updatedBy]
      properties:
        status:
          $ref: "#/components/schemas/OverrideStatus"
        updatedBy:
          type: string
          example: admin@pearsonspecter.com

    HistoryEntry:
      type: object
      properties:
        id:
          type: integer
          format: int64
        overrideId:
          type: string
        action:
          type: string
          enum: [created, updated, status_changed]
        changedBy:
          type: string
        changedAt:
          type: string
          format: date-time
        snapshotBefore:
          description: Full override record before the change (null for `created` action)
          nullable: true
        snapshotAfter:
          description: Full override record after the change

    ConflictPair:
      type: object
      properties:
        overrideA:
          type: string
          example: ovr-058
        overrideB:
          type: string
          example: ovr-059
        stepKey:
          $ref: "#/components/schemas/StepKey"
        traitKey:
          $ref: "#/components/schemas/TraitKey"
        reason:
          type: string
          example: "Same step/trait (file-complaint/slaHours), same specificity (2), overlapping effective dates, compatible selectors {state: FL, caseType: FC-Judicial} and {state: FL, caseType: FC-Judicial}"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          enum: [BAD_REQUEST, NOT_FOUND, INTERNAL_ERROR]
